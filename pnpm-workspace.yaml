# pnpm 10.3–10.25：仅识别 onlyBuiltDependencies（strictDepBuilds 默认 true）
# pnpm ≥10.26 / v11：使用 allowBuilds；v11 起不再读取 onlyBuiltDependencies，两处都写以兼容 CI 上的旧 pnpm
onlyBuiltDependencies:
  - core-js
  - esbuild
  - simple-git-hooks
  - typescript
  - vite
  - vitest
  - vue
  - vue-tsc

allowBuilds:
  core-js: true
  esbuild: true
  simple-git-hooks: true
  typescript: true
  vite: true
  vitest: true
  vue: true
  vue-tsc: true
