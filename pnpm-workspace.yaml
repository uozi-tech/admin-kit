catalogMode: prefer
shellEmulator: true
trustPolicy: no-downgrade

overrides:
  "vitepress>vite": "7.3.1"

packages:
  - 'packages/*'
  - '!packages/create-admin/template'
  - playground
  - docs

onlyBuiltDependencies:
  - core-js
  - esbuild
  - simple-git-hooks
  - typescript
  - vite
  - vitest
  - vue
  - vue-tsc
